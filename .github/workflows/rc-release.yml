name: RC Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RC version (e.g., 0.5.0-rc.1)'
        required: true
        type: string

jobs:
  create-rc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Error: Version must match X.Y.Z-rc.N format"
            exit 1
          fi

      - name: Create and push tag
        run: |
          TAG="v${{ inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
